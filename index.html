<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ishoweyes loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            color: white;
            font-family: sans-serif;
        }
        #reveal-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        #video-container {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }
        video {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <button id="reveal-button">reveal the eyes</button>

    <div id="video-container">
        <video id="loop-video" loop controls>
            <source src="ishoweyes.mp4" type="video/mp4">
            your browser does not support the video tag.
        </video>
    </div>

    <script>
        const btn = document.getElementById('reveal-button');
        const container = document.getElementById('video-container');
        const video = document.getElementById('loop-video');

        btn.addEventListener('click', () => {
            btn.style.display = 'none'; // hide the button
            container.style.display = 'flex'; // show the video
            video.play(); // start the loop
        });
    </script>

</body>
</html>
